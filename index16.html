<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kesar | JARVIS Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron;color:white}
body{background:black;overflow-x:hidden}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-size:22px;
letter-spacing:3px;
animation:fadeOut 3s forwards 2s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* SCROLL BAR */

#progress{
position:fixed;
top:0;
left:0;
height:4px;
background:#00f7ff;
width:0%;
z-index:999;
}

/* STAR FIELD */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero img{
width:220px;
border-radius:50%;
box-shadow:0 0 30px cyan;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%,100%{box-shadow:0 0 20px cyan}
50%{box-shadow:0 0 60px cyan}
}

h1{
font-size:55px;
background:linear-gradient(90deg,cyan,magenta);
-webkit-background-clip:text;
color:transparent;
}

/* TYPING */

#typing{
margin-top:15px;
color:#00f7ff;
}

/* GLASS CARDS */

.section{
padding:100px 10%;
text-align:center;
}

.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
padding:30px 40px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,255,0.3);
border-radius:20px;
transition:0.4s;
}

.card:hover{
transform:rotateY(15deg) scale(1.1);
box-shadow:0 0 40px cyan;
}

/* SOCIAL */

.social a{
display:inline-block;
margin:15px;
padding:15px 25px;
border:1px solid cyan;
border-radius:30px;
text-decoration:none;
transition:0.4s;
}

.social a:hover{
background:cyan;
color:black;
box-shadow:0 0 30px cyan;
}

</style>
</head>

<body>

<div id="loader">INITIALIZING SYSTEM...</div>
<div id="progress"></div>

<canvas id="stars"></canvas>

<div class="hero">

<img src="kesar01.jpeg">

<h1>KESAR SOORYAVANSHI</h1>

<p id="typing"></p>

</div>

<div class="section">

<h2>SKILLS</h2>

<div class="card-container">

<div class="card">Problem Solving</div>
<div class="card">Leadership</div>
<div class="card">Time Management</div>
<div class="card">Communication</div>

</div>
</div>

<div class="section">

<h2>CONNECT</h2>

<div class="social">

<a href="#">LinkedIn</a>
<a href="#">GitHub</a>
<a href="#">Instagram</a>

</div>
</div>

<script>

/* TYPING LOOP */

const roles=["BTech Student","Frontend Developer","Tech Creator","Future Founder"];
let i=0,j=0,current="",isDeleting=false;

function type(){
current=roles[i];
document.getElementById("typing").textContent=current.substring(0,j);

if(!isDeleting && j++===current.length){
isDeleting=true;
setTimeout(type,1000);
return;
}

if(isDeleting && j--===0){
isDeleting=false;
i=(i+1)%roles.length;
}

setTimeout(type,80);
}
type();

/* SCROLL PROGRESS */

window.onscroll=()=>{
let winScroll=document.body.scrollTop||document.documentElement.scrollTop;
let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
document.getElementById("progress").style.width=(winScroll/height)*100+"%";
}

/* STAR FIELD */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="cyan";
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,s.size,s.size);
s.y+=0.5;
if(s.y>canvas.height)s.y=0;
});
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
